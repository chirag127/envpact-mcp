name: Build & Release MCPB Bundle

# Builds envpact-mcp.mcpb on every tag push and attaches it to the
# GitHub Release. Users can drag the .mcpb onto Claude Desktop for
# one-click install — no global Node, no npm, no toolchain needed.
#
# Smithery local-stdio publishing also consumes this artifact:
#   smithery mcp publish ./envpact-mcp.mcpb -n chirag127/envpact-mcp
#
# Spec references:
#   https://github.com/modelcontextprotocol/mcpb
#   https://claude.com/docs/connectors/building/mcpb

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
  pull_request:
    paths:
      - 'mcpb/**'
      - 'src/**'
      - 'scripts/build-mcpb.js'

permissions:
  contents: write   # for softprops/action-gh-release on tag

jobs:
  build:
    name: Build .mcpb bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-node22-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node22-pnpm-
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Sync version with git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Syncing manifest + package.json to $VERSION"
          jq --arg v "$VERSION" '.version = $v' package.json > package.tmp && mv package.tmp package.json
          jq --arg v "$VERSION" '.version = $v' mcpb/manifest.json > manifest.tmp && mv manifest.tmp mcpb/manifest.json

      - name: Validate manifest
        run: pnpm run validate:mcpb

      - name: Build .mcpb
        run: pnpm run build:mcpb

      - name: Verify the .mcpb is well-formed (unpack round-trip)
        run: |
          mkdir -p /tmp/mcpb-verify
          node node_modules/@anthropic-ai/mcpb/dist/cli/cli.js unpack \
            dist/envpact-mcp.mcpb /tmp/mcpb-verify
          test -f /tmp/mcpb-verify/manifest.json
          test -f /tmp/mcpb-verify/server/index.js
          echo "✓ .mcpb structure verified"

      - name: Smoke-test the bundled server
        run: |
          # Spawn the bundled server, send MCP initialize + tools/list,
          # assert all 8 tools register.
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"smoke","version":"0.0.1"}}}'
          INITED='{"jsonrpc":"2.0","method":"notifications/initialized"}'
          TOOLS='{"jsonrpc":"2.0","id":2,"method":"tools/list"}'
          (printf '%s\n' "$INIT"; sleep 0.3; printf '%s\n' "$INITED"; sleep 0.3; printf '%s\n' "$TOOLS"; sleep 1) \
            | timeout 10s node /tmp/mcpb-verify/server/index.js > out.log 2>err.log || true
          grep -q '"name":"envpact"' out.log
          test "$(grep -oE '"name":"[a-z_]+"' out.log | wc -l)" -ge 8
          echo "✓ Bundled server passes MCP handshake with 8 tools"

      - name: Upload .mcpb as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: envpact-mcp-bundle
          path: dist/envpact-mcp.mcpb
          retention-days: 30

      - name: Attach .mcpb to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/envpact-mcp.mcpb
          generate_release_notes: true
          fail_on_unmatched_files: true
